<div class="auth-card space-y-6">
  <div class="space-y-2">
    <h2 class="type-display-md text-ink">مرحباً بعودتك</h2>
    <p class="type-body-sm text-body">
      قم بتسجيل الدخول إلى حسابك لتبقى على اتصال بصيدليتك.
    </p>
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label for="email" class="field-label">البريد الإلكتروني</label>
      <div class="relative">
        <span class="absolute inset-y-0 start-0 ps-4 flex items-center text-mute pointer-events-none">
          <i class="pi pi-envelope text-sm"></i>
        </span>
        <input id="email" type="email" formControlName="email" placeholder="name@example.com" class="field-input ps-11"
          [ngClass]="{
            'is-invalid':
              (f['email'].touched || f['email'].dirty) && (f['email'].invalid || f['email'].errors?.['serverError'])
          }" />
      </div>
      <div *ngIf="(f['email'].touched || f['email'].dirty) && f['email'].invalid" class="field-error">
        <i class="pi pi-exclamation-circle text-[10px]"></i>
        <span *ngIf="f['email'].errors?.['required']">يرجى إدخال عنوان بريدك الإلكتروني.</span>
        <span *ngIf="f['email'].errors?.['email']">يرجى إدخال عنوان بريد إلكتروني صحيح.</span>
      </div>
      <div *ngIf="f['email'].errors?.['serverError']" class="field-error">
        <i class="pi pi-exclamation-circle text-[10px]"></i>
        <span>{{ f['email'].errors?.['serverError'] }}</span>
      </div>
    </div>

    <div>
      <div class="flex justify-between items-center mb-2">
        <label for="password" class="field-label !mb-0">كلمة المرور</label>
        <a routerLink="/auth/forgot-password" class="type-body-sm link-ink">هل نسيت كلمة المرور؟</a>
      </div>
      <div class="relative">
        <span class="absolute inset-y-0 start-0 ps-4 flex items-center text-mute pointer-events-none">
          <i class="pi pi-lock text-sm"></i>
        </span>
        <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
          placeholder="••••••••" class="field-input ps-11 pe-11" [ngClass]="{
            'is-invalid':
              (f['password'].touched || f['password'].dirty) &&
              (f['password'].invalid || f['password'].errors?.['serverError'])
          }" />
        <button type="button" (click)="showPassword = !showPassword"
          class="absolute inset-y-0 end-0 pe-4 flex items-center text-mute hover:text-ink transition-colors"
          aria-label="Toggle password visibility">
          <i class="pi text-sm" [ngClass]="showPassword ? 'pi-eye-slash' : 'pi-eye'"></i>
        </button>
      </div>
      <div *ngIf="(f['password'].touched || f['password'].dirty) && f['password'].invalid" class="field-error">
        <i class="pi pi-exclamation-circle text-[10px]"></i>
        <span *ngIf="f['password'].errors?.['required']">يرجى إدخال كلمة المرور.</span>
      </div>
      <div *ngIf="f['password'].errors?.['serverError']" class="field-error">
        <i class="pi pi-exclamation-circle text-[10px]"></i>
        <span>{{ f['password'].errors?.['serverError'] }}</span>
      </div>
    </div>

    <button type="submit" [disabled]="isLoading || loginForm.invalid" class="btn-large mt-2">
      <i *ngIf="isLoading" class="pi pi-spin pi-spinner text-sm"></i>
      <span>{{ isLoading ? 'جاري تسجيل الدخول...' : 'تسجيل الدخول' }}</span>
    </button>
  </form>

  <p class="type-body-sm text-body text-center">
    ليس لديك حساب؟
    <a routerLink="/auth/register" class="link-ink">إنشاء حساب</a>
  </p>
</div>
