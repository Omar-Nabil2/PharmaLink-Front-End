<div class="auth-card space-y-6 text-right">
  <div class="space-y-2">
    <h2 class="type-display-md text-ink-deep">تأكيد رمز التحقق</h2>
    <p class="type-body-sm text-slate">
      يرجى إدخال رمز التحقق (OTP) المرسل في رسالة نصية إلى رقم هاتفك المحمول المسجل لإتمام تفعيل الحساب.
    </p>
  </div>

  <div class="flex gap-2 justify-between py-2" dir="ltr">
    <input
      *ngFor="let digit of otpDigits; let i = index"
      #digitInput
      type="text"
      inputmode="numeric"
      pattern="[0-9]*"
      maxLength="1"
      [value]="otpDigits[i]"
      (keydown)="onKeyDown($event, i)"
      (paste)="onPaste($event)"
      class="w-11 h-11 sm:w-12 sm:h-12 text-center type-heading-3 bg-canvas rounded-lg border border-hairline-strong outline-none focus:border-primary focus:shadow-[0_0_0_4px_var(--color-primary-100)] transition-all"
      [ngClass]="{ 'border-primary shadow-[0_0_0_4px_var(--color-primary-100)]': otpDigits[i] !== '' }"
    />
  </div>

  <div class="flex justify-between items-center type-caption">
    <span class="text-slate">
      الوقت المتبقي: <span class="text-ink-deep font-semibold">{{ formattedTime }}</span>
    </span>
    <span class="text-slate">
      لم يصلك الرمز؟
      <button
        type="button"
        (click)="sendOtpRequest()"
        [disabled]="!canResend"
        class="link-ink disabled:opacity-40 disabled:no-underline disabled:cursor-not-allowed bg-transparent border-none p-0 cursor-pointer"
      >
        إعادة الإرسال
      </button>
    </span>
  </div>

  <div class="space-y-3 pt-2">
    <button
      type="button"
      (click)="onVerify()"
      [disabled]="isLoading || isResending || !isCodeComplete"
      class="btn-large"
    >
      <i *ngIf="isLoading" class="pi pi-spin pi-spinner text-sm"></i>
      <span>تأكيد الرمز</span>
    </button>

    <button
      type="button"
      (click)="onCancel()"
      [disabled]="isLoading || isResending"
      class="btn-secondary w-full"
    >
      إلغاء
    </button>
  </div>
</div>
