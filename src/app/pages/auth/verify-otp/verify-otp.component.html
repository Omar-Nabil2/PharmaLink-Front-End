<div class="auth-card space-y-6">
  <div class="space-y-2">
    <h2 class="type-display-md text-ink">OTP verification</h2>
    <p class="type-body-sm text-body">
      Enter the one-time password sent to your registered phone number to complete verification.
    </p>
  </div>

  <div class="flex gap-2 justify-between py-2">
    <input
      *ngFor="let digit of otpDigits; let i = index"
      #digitInput
      type="text"
      inputmode="numeric"
      pattern="[0-9]*"
      maxLength="1"
      [value]="otpDigits[i]"
      (keydown)="onKeyDown($event, i)"
      (paste)="onPaste($event)"
      class="w-11 h-11 sm:w-12 sm:h-12 text-center type-display-sm bg-canvas rounded-[20px] border border-hairline-soft outline-none focus:border-brand-blue focus:shadow-[0_0_0_4px_rgba(66,98,255,0.12)]"
      [ngClass]="{ 'border-brand-blue shadow-[0_0_0_4px_rgba(66,98,255,0.12)]': otpDigits[i] !== '' }"
    />
  </div>

  <div class="flex justify-between items-center type-caption">
    <span class="text-body">
      Remaining time: <span class="text-ink font-medium">{{ formattedTime }}</span>
    </span>
    <span class="text-body">
      Didn't get the code?
      <button
        type="button"
        (click)="sendOtpRequest()"
        [disabled]="!canResend"
        class="link-ink disabled:opacity-40 disabled:no-underline disabled:cursor-not-allowed bg-transparent border-none p-0 cursor-pointer"
      >
        Resend
      </button>
    </span>
  </div>

  <div class="space-y-3 pt-2">
    <button
      type="button"
      (click)="onVerify()"
      [disabled]="isLoading || isResending || !isCodeComplete"
      class="btn-large"
    >
      <i *ngIf="isLoading" class="pi pi-spin pi-spinner text-xs"></i>
      <span>Verify</span>
    </button>

    <button
      type="button"
      (click)="onCancel()"
      [disabled]="isLoading || isResending"
      class="btn-secondary w-full"
    >
      Cancel
    </button>
  </div>
</div>
