<div class="auth-card space-y-6">
  <div class="space-y-2">
    <h2 class="type-display-md text-ink">هل نسيت كلمة المرور؟</h2>
    <p class="type-body-sm text-body">
      أدخل عنوان بريدك الإلكتروني المسجل لتلقي رابط إعادة تعيين كلمة المرور.
    </p>
  </div>

  <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label for="email" class="field-label">البريد الإلكتروني</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        placeholder="patient@example.com"
        class="field-input"
        [ngClass]="{
          'is-invalid': forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched
        }"
      />
      <div *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched" class="field-error">
        <i class="pi pi-exclamation-circle"></i>
        <span>يرجى إدخال بريد إلكتروني صحيح.</span>
      </div>
    </div>

    <button type="submit" [disabled]="forgotForm.invalid || isLoading" class="btn-large">
      <i *ngIf="isLoading" class="pi pi-spinner animate-spin"></i>
      <span>{{ isLoading ? 'جاري الإرسال...' : 'إرسال رابط التعيين' }}</span>
    </button>

    <div class="text-center">
      <a routerLink="/auth/login" class="type-body-sm link-ink inline-flex items-center gap-1">
        <i class="pi pi-arrow-right text-xs"></i>
        العودة لتسجيل الدخول
      </a>
    </div>
  </form>
</div>
