<div class="w-full">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Forgot Password?</h2>
        <p class="text-slate-500 mt-2 text-sm">Enter your registered email address to receive a password reset link.</p>
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
            <label for="email" class="block text-sm font-semibold text-slate-700 mb-1">Email Address</label>
            <input id="email" type="email" formControlName="email" placeholder="patient@example.com"
                class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all shadow-sm"
                [ngClass]="{'border-red-500 focus:ring-red-500 focus:border-red-500': forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched}">

            <!-- Validation -->
            <div *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched"
                class="text-red-500 text-xs mt-1.5 flex items-center gap-1">
                <i class="pi pi-exclamation-circle"></i>
                <span>Please enter a valid email address.</span>
            </div>
        </div>

        <button type="submit" [disabled]="forgotForm.invalid || isLoading"
            class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl transition-all shadow-md hover:shadow-lg disabled:opacity-60 disabled:cursor-not-allowed flex justify-center items-center gap-2">
            <i *ngIf="isLoading" class="pi pi-spinner animate-spin"></i>
            <span>{{ isLoading ? 'Sending...' : 'Send Reset Link' }}</span>
        </button>

        <div class="text-center mt-6">
            <a routerLink="/auth/login"
                class="text-emerald-600 hover:text-emerald-700 text-sm font-semibold transition-colors">
                <i class="pi pi-arrow-left text-xs mr-1"></i> Back to Login
            </a>
        </div>
    </form>
</div>
