<div class="w-full">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Set New Password</h2>
        <p class="text-slate-500 mt-2 text-sm">Please create a strong new password for your account.</p>
    </div>

    <!-- In case URL params are missing -->
    <div *ngIf="invalidLink"
        class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-6 flex items-start gap-3">
        <i class="pi pi-times-circle text-lg mt-0.5"></i>
        <div>
            <h4 class="font-bold text-sm">Invalid Reset Link</h4>
            <p class="text-xs mt-1">The link is missing required parameters. Please request a new password reset link.
            </p>
        </div>
    </div>

    <form *ngIf="!invalidLink" [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="space-y-5">

        <div>
            <label for="password" class="block text-sm font-semibold text-slate-700 mb-1">New Password</label>
            <input id="password" type="password" formControlName="password" placeholder="••••••••"
                class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all shadow-sm"
                [ngClass]="{'border-red-500 focus:ring-red-500': resetForm.get('password')?.invalid && resetForm.get('password')?.touched}">

            <div *ngIf="resetForm.get('password')?.invalid && resetForm.get('password')?.touched"
                class="text-red-500 text-xs mt-1.5">
                Password must be at least 8 characters long.
            </div>
        </div>

        <div>
            <label for="confirmPassword" class="block text-sm font-semibold text-slate-700 mb-1">Confirm
                Password</label>
            <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="••••••••"
                class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all shadow-sm"
                [ngClass]="{'border-red-500 focus:ring-red-500': (resetForm.get('confirmPassword')?.invalid || resetForm.errors?.['mismatch']) && resetForm.get('confirmPassword')?.touched}">

            <div *ngIf="resetForm.errors?.['mismatch'] && resetForm.get('confirmPassword')?.touched"
                class="text-red-500 text-xs mt-1.5 flex items-center gap-1">
                <i class="pi pi-exclamation-circle"></i>
                <span>Passwords do not match.</span>
            </div>
        </div>

        <button type="submit" [disabled]="resetForm.invalid || isLoading"
            class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl transition-all shadow-md hover:shadow-lg disabled:opacity-60 disabled:cursor-not-allowed flex justify-center items-center gap-2 mt-2">
            <i *ngIf="isLoading" class="pi pi-spinner animate-spin"></i>
            <span>{{ isLoading ? 'Saving...' : 'Reset Password' }}</span>
        </button>
    </form>
</div>
