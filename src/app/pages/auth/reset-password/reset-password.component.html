<div class="auth-card space-y-6 text-right">
  <div class="space-y-2">
    <h2 class="type-display-md text-ink-deep">تعيين كلمة مرور جديدة</h2>
    <p class="type-body-sm text-slate">يرجى إنشاء كلمة مرور جديدة وقوية لحسابك.</p>
  </div>

  <div *ngIf="invalidLink" class="bg-surface rounded-lg p-4 flex items-start gap-3 border border-hairline-soft">
    <i class="pi pi-times-circle text-lg mt-0.5 text-error"></i>
    <div>
      <h4 class="type-body-md-strong text-error">رابط إعادة التعيين غير صالح</h4>
      <p class="type-body-sm text-slate mt-1">
        يفتقد الرابط للمعلمات المطلوبة أو انتهت صلاحيته. يرجى طلب رابط إعادة تعيين كلمة المرور مرة أخرى.
      </p>
    </div>
  </div>

  <form *ngIf="!invalidLink" [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label for="password" class="field-label">كلمة المرور الجديدة</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        placeholder="••••••••"
        class="field-input text-left"
        dir="ltr"
        [ngClass]="{
          'is-invalid': resetForm.get('password')?.invalid && resetForm.get('password')?.touched
        }"
      />
      <div *ngIf="resetForm.get('password')?.invalid && resetForm.get('password')?.touched" class="field-error">
        <i class="pi pi-exclamation-circle text-[10px]"></i>
        <span>يجب أن تتكون كلمة المرور من 8 أحرف على الأقل.</span>
      </div>
    </div>

    <div>
      <label for="confirmPassword" class="field-label">تأكيد كلمة المرور</label>
      <input
        id="confirmPassword"
        type="password"
        formControlName="confirmPassword"
        placeholder="••••••••"
        class="field-input text-left"
        dir="ltr"
        [ngClass]="{
          'is-invalid':
            (resetForm.get('confirmPassword')?.invalid || resetForm.errors?.['mismatch']) &&
            resetForm.get('confirmPassword')?.touched
        }"
      />
      <div *ngIf="resetForm.errors?.['mismatch'] && resetForm.get('confirmPassword')?.touched" class="field-error">
        <i class="pi pi-exclamation-circle text-[10px]"></i>
        <span>كلمتا المرور غير متطابقتين.</span>
      </div>
    </div>

    <button type="submit" [disabled]="resetForm.invalid || isLoading" class="btn-large">
      <i *ngIf="isLoading" class="pi pi-spin pi-spinner text-sm"></i>
      <span>{{ isLoading ? 'جاري الحفظ...' : 'إعادة تعيين كلمة المرور' }}</span>
    </button>
  </form>
</div>
