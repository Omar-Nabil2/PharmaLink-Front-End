<div class="auth-card space-y-6">
  <div class="space-y-2">
    <h2 class="type-display-md text-ink">Set new password</h2>
    <p class="type-body-sm text-body">Please create a strong new password for your account.</p>
  </div>

  <div *ngIf="invalidLink" class="bg-canvas-soft rounded-[28px] p-4 flex items-start gap-3 border border-hairline-soft">
    <i class="pi pi-times-circle text-lg mt-0.5"></i>
    <div>
      <h4 class="type-body-md-strong">Invalid reset link</h4>
      <p class="type-body-sm text-body mt-1">
        The link is missing required parameters. Please request a new password reset link.
      </p>
    </div>
  </div>

  <form *ngIf="!invalidLink" [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label for="password" class="field-label">New password</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        placeholder="••••••••"
        class="field-input"
        [ngClass]="{
          'is-invalid': resetForm.get('password')?.invalid && resetForm.get('password')?.touched
        }"
      />
      <div *ngIf="resetForm.get('password')?.invalid && resetForm.get('password')?.touched" class="field-error">
        Password must be at least 8 characters long.
      </div>
    </div>

    <div>
      <label for="confirmPassword" class="field-label">Confirm password</label>
      <input
        id="confirmPassword"
        type="password"
        formControlName="confirmPassword"
        placeholder="••••••••"
        class="field-input"
        [ngClass]="{
          'is-invalid':
            (resetForm.get('confirmPassword')?.invalid || resetForm.errors?.['mismatch']) &&
            resetForm.get('confirmPassword')?.touched
        }"
      />
      <div *ngIf="resetForm.errors?.['mismatch'] && resetForm.get('confirmPassword')?.touched" class="field-error">
        <i class="pi pi-exclamation-circle"></i>
        <span>Passwords do not match.</span>
      </div>
    </div>

    <button type="submit" [disabled]="resetForm.invalid || isLoading" class="btn-large">
      <i *ngIf="isLoading" class="pi pi-spinner animate-spin"></i>
      <span>{{ isLoading ? 'Saving...' : 'Reset password' }}</span>
    </button>
  </form>
</div>
