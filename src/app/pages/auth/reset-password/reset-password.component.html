<div class="auth-card space-y-6">
  <div class="space-y-2">
    <h2 class="type-display-md text-ink">تعيين كلمة مرور جديدة</h2>
    <p class="type-body-sm text-body">يرجى إنشاء كلمة مرور قوية جديدة لحسابك.</p>
  </div>

  <div *ngIf="invalidLink" class="bg-canvas rounded-xl p-4 flex items-start gap-3">
    <i class="pi pi-times-circle text-lg mt-0.5"></i>
    <div>
      <h4 class="type-body-md-strong">رابط غير صالح</h4>
      <p class="type-body-sm text-body mt-1">
        الرابط يفتقد بعض المعلمات المطلوبة. يرجى طلب رابط جديد لإعادة تعيين كلمة المرور.
      </p>
    </div>
  </div>

  <form *ngIf="!invalidLink" [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label for="password" class="field-label">كلمة المرور الجديدة</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        placeholder="••••••••"
        class="field-input"
        [ngClass]="{
          'is-invalid': resetForm.get('password')?.invalid && resetForm.get('password')?.touched
        }"
      />
      <div *ngIf="resetForm.get('password')?.invalid && resetForm.get('password')?.touched" class="field-error">
        يجب أن تكون كلمة المرور 8 أحرف على الأقل.
      </div>
    </div>

    <div>
      <label for="confirmPassword" class="field-label">تأكيد كلمة المرور</label>
      <input
        id="confirmPassword"
        type="password"
        formControlName="confirmPassword"
        placeholder="••••••••"
        class="field-input"
        [ngClass]="{
          'is-invalid':
            (resetForm.get('confirmPassword')?.invalid || resetForm.errors?.['mismatch']) &&
            resetForm.get('confirmPassword')?.touched
        }"
      />
      <div *ngIf="resetForm.errors?.['mismatch'] && resetForm.get('confirmPassword')?.touched" class="field-error">
        <i class="pi pi-exclamation-circle"></i>
        <span>كلمتا المرور غير متطابقتين.</span>
      </div>
    </div>

    <button type="submit" [disabled]="resetForm.invalid || isLoading" class="btn-large">
      <i *ngIf="isLoading" class="pi pi-spinner animate-spin"></i>
      <span>{{ isLoading ? 'جاري الحفظ...' : 'إعادة تعيين كلمة المرور' }}</span>
    </button>
  </form>
</div>
