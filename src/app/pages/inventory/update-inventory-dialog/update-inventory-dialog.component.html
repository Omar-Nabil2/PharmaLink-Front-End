<p-toast position="top-center" />

<p-dialog
  [visible]="visible"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '32rem' }"
  [dismissableMask]="true"
  [maskStyleClass]="'bg-black/50'"
>
  <ng-template #header>
    <span class="text-[0.9375rem] font-bold text-foreground">تعديل بيانات الدواء</span>
  </ng-template>

  <div dir="rtl" class="space-y-4 pt-2" style="font-family: var(--font-cairo)">
    <!-- Drug name: READ-ONLY — the medicine identity cannot be changed on update -->
    <div class="space-y-1.5">
      <label class="block text-[0.8125rem] font-medium text-foreground">الدواء</label>
      <div
        class="w-full h-11 rounded-lg border border-border bg-muted/50 px-4 flex items-center gap-2 text-[0.8125rem] text-muted-foreground cursor-not-allowed select-none"
        aria-readonly="true"
      >
        <i class="pi pi-lock text-[0.75rem] shrink-0"></i>
        <span class="truncate font-medium text-foreground">{{ formDrugName() || '—' }}</span>
      </div>
      <p class="text-[0.8125rem] text-muted-foreground flex items-center gap-1">
        <span>🔒</span>
        <span>لا يمكن تغيير الدواء بعد إنشاء الصنف. يمكنك فقط تعديل الكمية والسعر وتاريخ الانتهاء.</span>
      </p>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div class="space-y-1.5">
        <label class="block text-[0.8125rem] font-medium text-foreground">الكمية بالمخزون</label>
        <input
          type="number"
          min="0"
          [ngModel]="formStockQuantity()"
          (ngModelChange)="formStockQuantity.set(+$event)"
          class="w-full h-11 rounded-lg border border-border bg-background px-4 text-[0.8125rem] outline-none transition-colors duration-200 focus:border-[#007671]"
        />
      </div>
      <div class="space-y-1.5">
        <label class="block text-[0.8125rem] font-medium text-foreground">سعر الوحدة (ج)</label>
        <input
          type="number"
          min="0"
          step="0.01"
          [ngModel]="formUnitPrice()"
          (ngModelChange)="formUnitPrice.set(+$event)"
          class="w-full h-11 rounded-lg border border-border bg-background px-4 text-[0.8125rem] outline-none transition-colors duration-200 focus:border-[#007671]"
        />
      </div>
    </div>

    <div class="space-y-1.5">
      <label class="block text-[0.8125rem] font-medium text-foreground">تاريخ الانتهاء</label>
      <input
        type="date"
        [ngModel]="formExpiryDate()"
        (ngModelChange)="formExpiryDate.set($event)"
        class="w-full h-11 rounded-lg border border-border bg-background px-4 text-[0.8125rem] outline-none transition-colors duration-200 focus:border-[#007671]"
      />
    </div>

    @if (isDetailLoading()) {
      <p class="text-[0.8125rem] text-muted-foreground flex items-center gap-2">
        <i class="pi pi-spin pi-spinner"></i>
        <span>جارٍ تحميل بيانات التزامن...</span>
      </p>
    }
  </div>

  <ng-template #footer>
    <div class="flex items-center justify-end gap-2 pt-2">
      <button
        type="button"
        (click)="close()"
        class="h-10 rounded-lg border border-border px-4 text-[0.8125rem] font-medium text-foreground transition-colors duration-200 hover:bg-muted"
      >
        إلغاء
      </button>
      <button
        type="button"
        (click)="save()"
        [disabled]="isSaving()"
        class="h-10 rounded-lg px-5 text-[0.8125rem] font-medium text-white flex items-center gap-2 transition-colors duration-200 disabled:opacity-60"
        style="background-color: #007671"
        onmouseover="this.style.backgroundColor='var(--color-green-hover)'"
        onmouseout="this.style.backgroundColor='#007671'"
      >
        @if (isSaving()) {
          <i class="pi pi-spin pi-spinner text-[0.8125rem]"></i>
        }
        <span>حفظ التعديلات</span>
      </button>
    </div>
  </ng-template>
</p-dialog>
