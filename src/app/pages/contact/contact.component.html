<section class="bg-canvas">
  <div class="container-app py-10 md:py-14">
    <div class="grid lg:grid-cols-2 gap-10 lg:gap-16 items-start">
      <div class="space-y-4">
        <h1 class="type-display-xxl">Contact</h1>
        <p class="type-body-lg text-body max-w-md">
          Questions about accounts, pharmacies, or orders? Send a message and our team will help.
        </p>

        <div class="space-y-4 pt-4">
          <div class="flex items-start gap-3">
            <div class="w-10 h-10 rounded-full bg-canvas-soft flex items-center justify-center shrink-0">
              <i class="pi pi-envelope"></i>
            </div>
            <div>
              <p class="type-body-md-strong">Email</p>
              <p class="type-body-sm text-body">support@pharmalink.app</p>
            </div>
          </div>
          <div class="flex items-start gap-3">
            <div class="w-10 h-10 rounded-full bg-canvas-soft flex items-center justify-center shrink-0">
              <i class="pi pi-phone"></i>
            </div>
            <div>
              <p class="type-body-md-strong">Phone</p>
              <p class="type-body-sm text-body">+20 100 000 0000</p>
            </div>
          </div>
        </div>
      </div>

      <div class="card-elevated space-y-5">
        <h2 class="type-display-md">Send a message</h2>
        <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="space-y-4">
          <div>
            <label for="name" class="field-label">Full name</label>
            <input
              id="name"
              type="text"
              formControlName="name"
              class="field-input"
              [ngClass]="{ 'is-invalid': f['name'].touched && f['name'].invalid }"
              placeholder="Your name"
            />
            <div *ngIf="f['name'].touched && f['name'].invalid" class="field-error">
              Please enter your name.
            </div>
          </div>

          <div>
            <label for="email" class="field-label">Email</label>
            <input
              id="email"
              type="email"
              formControlName="email"
              class="field-input"
              [ngClass]="{ 'is-invalid': f['email'].touched && f['email'].invalid }"
              placeholder="name@example.com"
            />
            <div *ngIf="f['email'].touched && f['email'].invalid" class="field-error">
              Please enter a valid email.
            </div>
          </div>

          <div>
            <label for="message" class="field-label">Message</label>
            <textarea
              id="message"
              formControlName="message"
              rows="5"
              class="field-input resize-y min-h-[120px]"
              [ngClass]="{ 'is-invalid': f['message'].touched && f['message'].invalid }"
              placeholder="How can we help?"
            ></textarea>
            <div *ngIf="f['message'].touched && f['message'].invalid" class="field-error">
              Message must be at least 10 characters.
            </div>
          </div>

          <button type="submit" class="btn-large" [disabled]="isSending || contactForm.invalid">
            <i *ngIf="isSending" class="pi pi-spin pi-spinner"></i>
            <span>{{ isSending ? 'Sending...' : 'Send message' }}</span>
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
