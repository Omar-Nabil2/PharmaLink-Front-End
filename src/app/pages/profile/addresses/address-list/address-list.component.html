<div class="container-app py-8" dir="rtl">

  <!-- Header -->
  <div class="flex items-center justify-between mb-8 pb-4 border-b border-surface-pressed">
    <div class="flex items-center gap-2 text-mute type-body-sm">
      <span>المريض</span>
      <span>/</span>
      <span class="text-ink font-medium">عناويني</span>
    </div>
    <a routerLink="/patient/addresses/new" class="btn-primary !bg-emerald-700 !hover:bg-emerald-800 text-white flex items-center gap-2 px-4 py-2 rounded-lg transition-colors">
      <i class="pi pi-plus"></i>
      <span>إضافة عنوان جديد</span>
    </a>
  </div>

  <div *ngIf="successMessage" class="mb-6 p-4 rounded-lg bg-emerald-50 border border-emerald-200 text-emerald-700 flex items-center gap-2">
    <i class="pi pi-check-circle"></i>
    <span class="type-body-md font-medium">{{ successMessage }}</span>
  </div>

  <div *ngIf="isLoading" class="flex justify-center items-center py-20">
    <i class="pi pi-spinner animate-spin text-4xl text-emerald-700"></i>
  </div>

  <div *ngIf="!isLoading && (!addresses || addresses.length === 0)" class="bg-white rounded-xl border border-gray-100 shadow-sm text-center py-16">
    <i class="pi pi-map-marker text-5xl mb-4 text-gray-300"></i>
    <h3 class="type-display-md text-gray-800 mb-2">لا توجد عناوين</h3>
    <p class="type-body-md text-gray-500 mb-6">ليس لديك أي عناوين مسجلة. قم بإضافة عنوان جديد لتوصيل الطلبات.</p>
    <a routerLink="/patient/addresses/new" class="btn-primary !bg-emerald-700 text-white inline-flex gap-2 px-6">
      <i class="pi pi-plus"></i>
      <span>إضافة عنوان جديد</span>
    </a>
  </div>

  <div *ngIf="!isLoading && addresses && addresses.length > 0" class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div *ngFor="let address of addresses; let i = index" class="bg-white rounded-2xl border border-gray-100 p-6 flex justify-between shadow-sm hover:shadow-md transition-shadow">
      
      <!-- Right Side (Details) -->
      <div class="flex flex-col items-start text-right">
        <!-- Header: Title and Icon -->
        <div class="flex items-center gap-3 mb-2">
          <div class="w-10 h-10 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-700">
            <i class="pi pi-map-marker text-lg"></i>
          </div>
          <h3 class="type-display-sm text-gray-900 font-bold">{{ 'عنوان ' + (i + 1) }}</h3>
        </div>
        
        <!-- Default Badge -->
        <div *ngIf="address.isDefault" class="mb-3 ms-12">
          <span class="bg-emerald-100 text-emerald-800 text-xs px-3 py-1 rounded-full font-medium">
            افتراضي
          </span>
        </div>
        <div *ngIf="!address.isDefault" class="mb-3 ms-12">
          <button (click)="setDefault(address.addressId)" class="text-xs text-blue-600 hover:text-blue-800 font-medium transition-colors">
            تعيين كافتراضي
          </button>
        </div>

        <!-- Address Lines -->
        <div class="ms-13 text-gray-600 type-body-sm leading-relaxed">
          <p>{{ address.governorate }}, {{ address.city }}</p>
          <p>{{ address.addressLine }}</p>
          <div *ngIf="address.latitude && address.longitude" class="mt-2 flex items-center gap-1.5 text-xs text-gray-500">
            <i class="pi pi-map text-emerald-600"></i>
            <a [href]="'https://www.google.com/maps?q=' + address.latitude + ',' + address.longitude" target="_blank" class="hover:text-emerald-700">عرض على الخريطة</a>
          </div>
        </div>
      </div>

      <!-- Left Side (Actions) -->
      <div class="flex gap-3 items-start">
        <a [routerLink]="['/patient/addresses/edit', address.addressId]" class="text-blue-500 hover:text-blue-700 hover:bg-blue-50 p-2 rounded-full transition-colors" title="تعديل">
          <i class="pi pi-pencil"></i>
        </a>
        <button (click)="deleteAddress(address.addressId)" class="text-red-500 hover:text-red-700 hover:bg-red-50 p-2 rounded-full transition-colors" title="حذف">
          <i class="pi pi-trash"></i>
        </button>
      </div>

    </div>
  </div>
</div>
