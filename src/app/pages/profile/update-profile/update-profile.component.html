<div class="max-w-2xl mx-auto p-6 lg:p-8" dir="rtl">
    <div class="mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">تعديل الملف الشخصي</h1>
            <p class="text-slate-500 mt-2">تحديث معلوماتك الشخصية.</p>
        </div>
    </div>

    <!-- Loading Skeleton -->
    <div *ngIf="isFetching" class="flex justify-center items-center py-20">
        <i class="pi pi-spinner animate-spin text-4xl text-emerald-600"></i>
    </div>

    <!-- Form Area -->
    <div *ngIf="!isFetching" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
        <form [formGroup]="updateForm" (ngSubmit)="onSubmit()" class="space-y-6">

            <div>
                <label for="fullName" class="block text-sm font-semibold text-slate-700 mb-1">الاسم الكامل</label>
                <input id="fullName" type="text" formControlName="fullName"
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all shadow-sm"
                    [ngClass]="{'border-red-500 focus:ring-red-500': updateForm.get('fullName')?.invalid && updateForm.get('fullName')?.touched}">

                <div *ngIf="updateForm.get('fullName')?.invalid && updateForm.get('fullName')?.touched"
                    class="text-red-500 text-xs mt-1.5 flex items-center gap-1">
                    <i class="pi pi-exclamation-circle"></i>
                    <span>الاسم الكامل مطلوب (3 أحرف على الأقل).</span>
                </div>
            </div>

            <div>
                <label for="phoneNumber" class="block text-sm font-semibold text-slate-700 mb-1">رقم الهاتف</label>
                <input id="phoneNumber" type="text" formControlName="phoneNumber"
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all shadow-sm"
                    [ngClass]="{'border-red-500 focus:ring-red-500': updateForm.get('phoneNumber')?.invalid && updateForm.get('phoneNumber')?.touched}">

                <div *ngIf="updateForm.get('phoneNumber')?.invalid && updateForm.get('phoneNumber')?.touched"
                    class="text-red-500 text-xs mt-1.5 flex flex-col gap-1">
                    <div *ngIf="updateForm.get('phoneNumber')?.errors?.['required']" class="flex items-center gap-1">
                        <i class="pi pi-exclamation-circle"></i>
                        <span>رقم الهاتف مطلوب.</span>
                    </div>
                    <div *ngIf="updateForm.get('phoneNumber')?.errors?.['pattern']" class="flex items-center gap-1">
                        <i class="pi pi-exclamation-circle"></i>
                        <span>يرجى إدخال رقم هاتف مصري صحيح.</span>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex items-center justify-end gap-3 pt-4 mt-6 border-t border-slate-100">
                <!-- زرار الإلغاء بيرجعنا للبروفايل برضه -->
                <a routerLink="/profile"
                    class="px-5 py-2.5 rounded-xl font-semibold text-slate-600 hover:bg-slate-100 transition-colors">
                    إلغاء
                </a>
                <button type="submit" [disabled]="updateForm.invalid || isLoading" class="btn-primary">
                    <i *ngIf="isLoading" class="pi pi-spinner animate-spin"></i>
                    <span>{{ isLoading ? 'جاري الحفظ...' : 'حفظ التغييرات' }}</span>
                </button>
            </div>

        </form>
    </div>
</div>
