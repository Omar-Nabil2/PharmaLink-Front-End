<div class="max-w-2xl mx-auto p-6 lg:p-8">
  <div class="mb-8 flex justify-between items-center">
    <div>
      <h1 class="type-display-xl text-ink">Edit profile</h1>
      <p class="type-body-md text-body mt-2">Update your personal information.</p>
    </div>
  </div>

  <div *ngIf="isFetching" class="flex justify-center items-center py-20">
    <i class="pi pi-spinner animate-spin text-4xl text-ink"></i>
  </div>

  <div *ngIf="!isFetching" class="card-elevated p-6 sm:p-8">
    <form [formGroup]="updateForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label for="fullName" class="field-label">Full name</label>
        <input
          id="fullName"
          type="text"
          formControlName="fullName"
          class="field-input"
          [ngClass]="{'is-invalid': updateForm.get('fullName')?.invalid && updateForm.get('fullName')?.touched}"
        />

        <div *ngIf="updateForm.get('fullName')?.invalid && updateForm.get('fullName')?.touched" class="field-error">
          <i class="pi pi-exclamation-circle"></i>
          <span>Full name is required (min 3 characters).</span>
        </div>
      </div>

      <div>
        <label for="phoneNumber" class="field-label">Phone number</label>
        <input
          id="phoneNumber"
          type="text"
          formControlName="phoneNumber"
          class="field-input"
          [ngClass]="{'is-invalid': updateForm.get('phoneNumber')?.invalid && updateForm.get('phoneNumber')?.touched}"
        />

        <div *ngIf="updateForm.get('phoneNumber')?.invalid && updateForm.get('phoneNumber')?.touched" class="field-error flex-col gap-1">
          <div *ngIf="updateForm.get('phoneNumber')?.errors?.['required']" class="flex items-center gap-1">
            <i class="pi pi-exclamation-circle"></i>
            <span>Phone number is required.</span>
          </div>
          <div *ngIf="updateForm.get('phoneNumber')?.errors?.['pattern']" class="flex items-center gap-1">
            <i class="pi pi-exclamation-circle"></i>
            <span>Please enter a valid Egyptian phone number.</span>
          </div>
        </div>
      </div>

      <div class="flex items-center justify-end gap-3 pt-4 mt-6 border-t border-hairline-soft">
        <a routerLink="/profile" class="btn-secondary">
          Cancel
        </a>
        <button type="submit" [disabled]="updateForm.invalid || isLoading" class="btn-primary">
          <i *ngIf="isLoading" class="pi pi-spinner animate-spin"></i>
          <span>{{ isLoading ? 'Saving...' : 'Save Changes' }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
