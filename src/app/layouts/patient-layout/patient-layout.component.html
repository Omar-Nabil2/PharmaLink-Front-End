<div class="flex flex-col h-screen overflow-hidden bg-canvas font-sans">
  <app-navbar class="flex-shrink-0 z-50 shadow-sm" />

  <div class="flex flex-1 overflow-hidden">
    <app-sidebar [items]="patientNavItems" class="hidden md:block h-full flex-shrink-0" />

    <!-- 1. Made main a flex-col container and removed padding -->
    <main class="flex-1 flex flex-col overflow-y-auto bg-canvas-softer">

      <!-- 2. Added a wrapper div for router-outlet to handle the padding and take up remaining space -->
      <div class="flex-1 p-4 md:p-8">
        <router-outlet></router-outlet>
      </div>

      <!-- 3. Footer now sits outside the padded area, taking full width naturally -->
      <app-footer class="flex-shrink-0" />

    </main>
  </div>
</div>
