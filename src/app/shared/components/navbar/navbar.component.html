<nav class="sticky top-0 z-50 w-full bg-canvas border-b border-surface-pressed">
  <div class="container mx-auto px-4">
    <div class="flex justify-between items-center py-4">
      <a routerLink="/" class="flex items-center gap-2 cursor-pointer select-none">
        <img src="/logo.png" alt="Pharma Link" class="h-10 md:h-12 w-auto object-contain" />
        <span class="type-display-sm hidden sm:inline">فارما لينك</span>
      </a>

      <div class="hidden lg:flex items-center gap-8">
        <a
          routerLink="/"
          routerLinkActive="text-ink after:w-4/5"
          [routerLinkActiveOptions]="{ exact: true }"
          aria-current="page"
          class="relative inline-block type-body-md-strong text-body hover:text-ink transition-colors duration-200
                after:content-[''] after:absolute after:left-1/2 after:-bottom-1 after:-translate-x-1/2
                after:h-[2px] after:w-0 after:bg-ink after:rounded-full after:transition-all after:duration-300 after:ease-out
                hover:after:w-4/5"
        >
          الرئيسية
        </a>
        <a
          routerLink="/products"
          routerLinkActive="text-ink after:w-4/5"
          class="relative inline-block type-body-md-strong text-body hover:text-ink transition-colors duration-200
                after:content-[''] after:absolute after:left-1/2 after:-bottom-1 after:-translate-x-1/2
                after:h-[2px] after:w-0 after:bg-ink after:rounded-full after:transition-all after:duration-300 after:ease-out
                hover:after:w-4/5"
        >
          المنتجات
        </a>
        <a
          routerLink="/services"
          routerLinkActive="text-ink after:w-4/5"
          class="relative inline-block type-body-md-strong text-body hover:text-ink transition-colors duration-200
                after:content-[''] after:absolute after:left-1/2 after:-bottom-1 after:-translate-x-1/2
                after:h-[2px] after:w-0 after:bg-ink after:rounded-full after:transition-all after:duration-300 after:ease-out
                hover:after:w-4/5"
        >
          الخدمات
        </a>
        <a
          routerLink="/contact"
          routerLinkActive="text-ink after:w-4/5"
          class="relative inline-block type-body-md-strong text-body hover:text-ink transition-colors duration-200
                after:content-[''] after:absolute after:left-1/2 after:-bottom-1 after:-translate-x-1/2
                after:h-[2px] after:w-0 after:bg-ink after:rounded-full after:transition-all after:duration-300 after:ease-out
                hover:after:w-4/5"
        >
          اتصل بنا
        </a>
        @if (isLoggedIn) {
          <a
            [routerLink]="dashboardPath"
            routerLinkActive="text-ink after:w-4/5"
            class="relative inline-block type-body-md-strong text-body hover:text-ink transition-colors duration-200
                  after:content-[''] after:absolute after:left-1/2 after:-bottom-1 after:-translate-x-1/2
                  after:h-[2px] after:w-0 after:bg-ink after:rounded-full after:transition-all after:duration-300 after:ease-out
                  hover:after:w-4/5"
          >
            لوحة التحكم
          </a>
        }
      </div>

      <div class="hidden md:flex items-center gap-3">
        <ng-container *ngIf="!isLoggedIn">
          <a routerLink="/auth/login" class="btn-secondary">تسجيل الدخول</a>
          <a routerLink="/auth/register" class="btn-primary">حساب جديد</a>
        </ng-container>

        <ng-container *ngIf="isLoggedIn">
          <a routerLink="/profile" class="btn-subtle gap-2">
            <i class="pi pi-user text-sm"></i>
            <span>{{ fullName }}</span>
          </a>
          <!-- <a routerLink="/change-password" class="btn-secondary">Change password</a> -->
          <button type="button" (click)="logout()" class="btn-primary">تسجيل الخروج</button>
        </ng-container>
      </div>

      <button
        type="button"
        class="md:hidden flex items-center justify-center w-10 h-10 rounded-full bg-canvas-soft text-ink"
        (click)="menuOpen = !menuOpen"
        [attr.aria-expanded]="menuOpen"
        aria-label="Toggle menu"
      >
        <i class="pi text-xl" [ngClass]="menuOpen ? 'pi-times' : 'pi-bars'"></i>
      </button>
    </div>

    <div *ngIf="menuOpen" class="md:hidden pb-6 space-y-4 border-t border-surface-pressed pt-4">
      <a routerLink="/" (click)="menuOpen = false" class="block type-body-md-strong py-2">الرئيسية</a>
      <a routerLink="/products" (click)="menuOpen = false" class="block type-body-md-strong py-2">المنتجات</a>
      <a routerLink="/services" (click)="menuOpen = false" class="block type-body-md-strong py-2">الخدمات</a>
      <a routerLink="/contact" (click)="menuOpen = false" class="block type-body-md-strong py-2">اتصل بنا</a>

      <div class="flex flex-col gap-3 pt-2">
        <ng-container *ngIf="!isLoggedIn">
          <a routerLink="/auth/login" (click)="menuOpen = false" class="btn-secondary w-full">تسجيل الدخول</a>
          <a routerLink="/auth/register" (click)="menuOpen = false" class="btn-primary w-full">حساب جديد</a>
        </ng-container>
        <ng-container *ngIf="isLoggedIn">
          <a routerLink="/profile" (click)="menuOpen = false" class="btn-subtle w-full">{{ fullName }}</a>
          <a routerLink="/change-password" (click)="menuOpen = false" class="btn-secondary w-full">تغيير كلمة المرور</a>
          <button type="button" (click)="logout(); menuOpen = false" class="btn-primary w-full">تسجيل الخروج</button>
        </ng-container>
      </div>
    </div>
  </div>
</nav>
