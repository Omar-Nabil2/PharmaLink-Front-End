<nav class="sticky top-0 z-50 w-full bg-canvas border-b border-surface-pressed">
  <div class="container-app">
    <div class="flex justify-between items-center py-4">
      <a routerLink="/" class="flex items-center gap-2 cursor-pointer select-none">
        <img src="/logo.png" alt="Pharma Link" class="h-10 md:h-12 w-auto object-contain" />
        <span class="type-display-sm hidden sm:inline">Pharma Link</span>
      </a>

      <div class="hidden lg:flex items-center gap-8">
        <a
          routerLink="/"
          routerLinkActive="opacity-100"
          [routerLinkActiveOptions]="{ exact: true }"
          class="type-body-md-strong text-ink opacity-70 hover:opacity-100 transition-opacity"
        >
          Home
        </a>
        <a
          routerLink="/products"
          routerLinkActive="opacity-100"
          class="type-body-md-strong text-ink opacity-70 hover:opacity-100 transition-opacity"
        >
          Products
        </a>
        <a
          routerLink="/services"
          routerLinkActive="opacity-100"
          class="type-body-md-strong text-ink opacity-70 hover:opacity-100 transition-opacity"
        >
          Services
        </a>
        <a
          routerLink="/contact"
          routerLinkActive="opacity-100"
          class="type-body-md-strong text-ink opacity-70 hover:opacity-100 transition-opacity"
        >
          Contact
        </a>
      </div>

      <div class="hidden md:flex items-center gap-3">
        <ng-container *ngIf="!isLoggedIn">
          <a routerLink="/auth/login" class="btn-secondary">Log in</a>
          <a routerLink="/auth/register" class="btn-primary">Sign up</a>
        </ng-container>

        <ng-container *ngIf="isLoggedIn">
          <a routerLink="/profile" class="btn-subtle gap-2">
            <i class="pi pi-user text-sm"></i>
            <span>{{ fullName }}</span>
          </a>
          <a routerLink="/change-password" class="btn-secondary">Change password</a>
          <button type="button" (click)="logout()" class="btn-primary">Logout</button>
        </ng-container>
      </div>

      <button
        type="button"
        class="md:hidden flex items-center justify-center w-10 h-10 rounded-full bg-canvas-soft text-ink"
        (click)="menuOpen = !menuOpen"
        [attr.aria-expanded]="menuOpen"
        aria-label="Toggle menu"
      >
        <i class="pi text-xl" [ngClass]="menuOpen ? 'pi-times' : 'pi-bars'"></i>
      </button>
    </div>

    <div *ngIf="menuOpen" class="md:hidden pb-6 space-y-4 border-t border-surface-pressed pt-4">
      <a routerLink="/" (click)="menuOpen = false" class="block type-body-md-strong py-2">Home</a>
      <a routerLink="/products" (click)="menuOpen = false" class="block type-body-md-strong py-2">Products</a>
      <a routerLink="/services" (click)="menuOpen = false" class="block type-body-md-strong py-2">Services</a>
      <a routerLink="/contact" (click)="menuOpen = false" class="block type-body-md-strong py-2">Contact</a>

      <div class="flex flex-col gap-3 pt-2">
        <ng-container *ngIf="!isLoggedIn">
          <a routerLink="/auth/login" (click)="menuOpen = false" class="btn-secondary w-full">Log in</a>
          <a routerLink="/auth/register" (click)="menuOpen = false" class="btn-primary w-full">Sign up</a>
        </ng-container>
        <ng-container *ngIf="isLoggedIn">
          <a routerLink="/profile" (click)="menuOpen = false" class="btn-subtle w-full">{{ fullName }}</a>
          <a routerLink="/change-password" (click)="menuOpen = false" class="btn-secondary w-full">Change password</a>
          <button type="button" (click)="logout(); menuOpen = false" class="btn-primary w-full">Logout</button>
        </ng-container>
      </div>
    </div>
  </div>
</nav>
