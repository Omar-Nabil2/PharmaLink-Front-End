<aside class="w-64 h-full bg-canvas border-l border-hairline-soft flex flex-col pt-6">
  <div class="px-6 mb-8 flex items-center gap-2">
    <span class="flex h-8 w-8 items-center justify-center rounded-full bg-primary text-sm font-semibold text-on-primary">
      PL
    </span>
    <span class="type-heading-5 text-primary hidden sm:inline">فارما لينك</span>
  </div>

  <nav class="flex-1 px-4 space-y-2 overflow-y-auto">
    <a
      *ngFor="let item of items"
      [routerLink]="item.routerLink"
      routerLinkActive="bg-primary-50 !text-primary-700 font-bold"
      [routerLinkActiveOptions]="{ exact: item.routerLink === '/' }"
      class="flex items-center gap-3 px-4 py-3 rounded-lg text-charcoal type-body-md hover:bg-surface transition-colors"
    >
      <i *ngIf="item.icon" [class]="item.icon + ' text-lg'"></i>
      <span>{{ item.label }}</span>
    </a>
  </nav>

  <div class="p-4 border-t border-hairline-soft flex items-center gap-3">
    <p-avatar
      [label]="fullName ? fullName.charAt(0).toUpperCase() : 'م'"
      shape="circle"
      styleClass="bg-primary-100 text-primary-700">
    </p-avatar>
    <div class="flex-1 overflow-hidden">
      <p class="type-body-sm-strong text-ink truncate">{{ fullName }}</p>
      <p class="type-caption text-mute truncate">{{ authService.userRole() || roleName }}</p>
    </div>
  </div>
</aside>
